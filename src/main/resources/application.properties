spring.application.name=ratelimex
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=500ms

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true

ratelimex.namespace=${RATELIMEX_NAMESPACE:default}
ratelimex.failure-mode=${RATELIMEX_FAILURE_MODE:FAIL_CLOSED}

ratelimex.global-limit.capacity=10000
ratelimex.global-limit.refill-tokens-per-second=1000
ratelimex.global-limit.ttl-seconds=120

ratelimex.default-api-limit.capacity=1000
ratelimex.default-api-limit.refill-tokens-per-second=100
ratelimex.default-api-limit.ttl-seconds=120

ratelimex.default-user-limit.capacity=60
ratelimex.default-user-limit.refill-tokens-per-second=10
ratelimex.default-user-limit.ttl-seconds=120

# Example endpoint override:
# ratelimex.api-limits[/api/test].capacity=100
# ratelimex.api-limits[/api/test].refill-tokens-per-second=20
# ratelimex.api-limits[/api/test].ttl-seconds=120
