spring.application.name=ratelimex

spring.datasource.url=${DB_URL:jdbc:h2:mem:ratelimex;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=500ms
spring.data.redis.repositories.enabled=false

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

ratelimex.namespace=${RATELIMEX_NAMESPACE:default}
ratelimex.failure-mode=${RATELIMEX_FAILURE_MODE:FAIL_CLOSED}
ratelimex.security.admin-api-key=${ADMIN_API_KEY:dev-admin-key}
ratelimex.security.admin-api-key-header=${ADMIN_API_KEY_HEADER:X-Admin-Api-Key}

ratelimex.global-limit.capacity=10000
ratelimex.global-limit.refill-tokens-per-second=1000
ratelimex.global-limit.ttl-seconds=120

ratelimex.default-api-limit.capacity=1000
ratelimex.default-api-limit.refill-tokens-per-second=100
ratelimex.default-api-limit.ttl-seconds=120

ratelimex.default-user-limit.capacity=60
ratelimex.default-user-limit.refill-tokens-per-second=10
ratelimex.default-user-limit.ttl-seconds=120

# Example endpoint override:
# ratelimex.api-limits[/api/test].capacity=100
# ratelimex.api-limits[/api/test].refill-tokens-per-second=20
# ratelimex.api-limits[/api/test].ttl-seconds=120
