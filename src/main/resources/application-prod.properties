spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

spring.docker.compose.enabled=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.data.redis.url=${REDIS_URL}
spring.data.redis.timeout=${REDIS_TIMEOUT:500ms}
spring.data.redis.repositories.enabled=false

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true

management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

server.port=${PORT:${SERVER_PORT:8080}}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

ratelimex.namespace=${RATELIMEX_NAMESPACE}
ratelimex.failure-mode=${RATELIMEX_FAILURE_MODE:FAIL_CLOSED}
ratelimex.security.admin-api-key=${ADMIN_API_KEY}
ratelimex.security.admin-api-key-header=${ADMIN_API_KEY_HEADER:X-Admin-Api-Key}
