name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "26"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw --batch-mode --no-transfer-progress verify

  container:
    name: Build container
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set image name
        id: image
        shell: bash
        run: echo "image=${REGISTRY}/${GITHUB_REPOSITORY,,}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    needs: container
    if: >-
      github.event_name == 'push' &&
      vars.ENABLE_K8S_DEPLOY == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      KUBE_NAMESPACE: ${{ vars.KUBE_NAMESPACE || 'default' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure Kubernetes access
        env:
          KUBE_CONFIG_BASE64: ${{ secrets.KUBE_CONFIG_BASE64 }}
        shell: bash
        run: |
          echo "$KUBE_CONFIG_BASE64" | base64 --decode > "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> "$GITHUB_ENV"

      - name: Apply Kubernetes manifests
        shell: bash
        run: |
          kubectl apply --namespace "$KUBE_NAMESPACE" -f k8s/service.yaml
          kubectl apply --namespace "$KUBE_NAMESPACE" -f k8s/ingress.yaml
          kubectl set image -f k8s/deployment.yaml \
            ratelimex="${{ needs.container.outputs.image }}" \
            --local -o yaml |
            kubectl apply --namespace "$KUBE_NAMESPACE" -f -

      - name: Wait for rollout
        run: kubectl rollout status deployment/ratelimex-app --namespace "$KUBE_NAMESPACE" --timeout=180s
