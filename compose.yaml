services:
  app:
    build: .
    profiles: ["app"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/ratelimex
      DB_USERNAME: ratelimex
      DB_PASSWORD: ratelimex
      REDIS_URL: redis://redis:6379
      RATELIMEX_NAMESPACE: local
      RATELIMEX_FAILURE_MODE: FAIL_CLOSED
      ADMIN_API_KEY: local-admin-key
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ratelimex
      POSTGRES_USER: ratelimex
      POSTGRES_PASSWORD: ratelimex
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ratelimex -d ratelimex"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
